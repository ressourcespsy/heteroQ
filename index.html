<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Hétéro-questionnaires (usage soignant)</title>
<style>
:root{
  --topbar-h:60px;
  --ivory:#f3ecdf; --paper:#ffffff; --cream:#f5f0e7; --line:#dcd3c4;
  --ink:#1f2540;
  /* Accent piloté par questionnaire (par défaut : sarcelle "suite") */
  --accent:#2c7a78; --accent-d:#1f5a58; --accent-l:#5aa3a0;
  --tint:color-mix(in srgb,var(--accent) 14%,#fff);
  --soft:color-mix(in srgb,var(--accent) 7%,#fff);
  --accent-ink:color-mix(in srgb,var(--accent-d) 90%,#000);
  --danger:#9c4221; --danger-soft:#fdf3ee; --danger-line:#efd9cb; --danger-ink:#6a4a3a;
  --ok:#2f7d57; --ok-soft:#e9f4ee;
  --shadow:0 1px 2px rgba(31,37,64,.06),0 8px 24px rgba(31,37,64,.07);
  --font:"Segoe UI",system-ui,-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
  --radius:16px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{margin:0;font-family:var(--font);color:var(--ink);background:var(--ivory);font-size:15px;line-height:1.55}
a{color:var(--accent-d)}
button{font-family:inherit}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:60;background:rgba(243,236,223,.94);backdrop-filter:saturate(1.2) blur(6px);border-bottom:1px solid var(--line)}
.topbar .inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:8px 16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--accent-d);font-size:14.5px;background:none;border:0;cursor:pointer;padding:4px 2px}
.brand .tag{font-size:10px;font-weight:800;color:#fff;background:var(--accent);padding:2px 9px;border-radius:999px;letter-spacing:.05em;text-transform:uppercase}
.hamburger{display:none;background:#fff;border:1px solid var(--line);border-radius:9px;width:36px;height:34px;cursor:pointer;align-items:center;justify-content:center;color:var(--accent-d)}
.hamburger svg{width:18px;height:18px}

.patientchip{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 9px;cursor:pointer;font-size:13px;color:var(--ink);max-width:46vw;overflow:hidden}
.patientchip:hover{border-color:var(--accent-l)}
.patientchip .av{width:22px;height:22px;border-radius:50%;background:var(--tint);color:var(--accent-d);font-weight:800;font-size:11px;display:grid;place-items:center;flex:none}
.patientchip .who{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.patientchip .dob{color:#6a7188;white-space:nowrap}
.patientchip.empty .who{color:#8a8f9e;font-weight:600}

/* segmented toggle (Questionnaire / Cotation) */
.seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:2px;gap:2px}
.seg button{border:0;background:none;cursor:pointer;font-weight:700;font-size:12px;color:var(--ink);padding:5px 11px;border-radius:999px;line-height:1.1;white-space:nowrap}
.seg button.on{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(31,37,64,.18)}
.seg button:not(.on):hover{color:var(--accent-d)}

.tools{margin-left:auto;display:flex;gap:8px;align-items:center;position:relative;flex-wrap:wrap}
.tbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:600;font-size:12.5px;padding:6px 11px;border-radius:10px;cursor:pointer;white-space:nowrap}
.tbtn:hover{border-color:var(--accent-l)}
.tbtn .ic{font-size:15px;line-height:1}
.tbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.tbtn.primary:hover{background:var(--accent-d);border-color:var(--accent-d)}
.tbtn .caret{font-size:10px;opacity:.6;margin-left:-2px}

/* popover */
.pop{position:absolute;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:6px;min-width:230px;z-index:70;display:none}
.pop.show{display:block}
.pop .pitem{display:flex;flex-direction:column;gap:1px;width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:9px 11px;border-radius:9px}
.pop .pitem:hover{background:var(--soft)}
.pop .pitem:disabled{opacity:.4;cursor:not-allowed}
.pop .pitem .t{font-weight:700;font-size:13.5px;color:var(--ink)}
.pop .pitem .s{font-size:12px;color:#6a7188}
.pop .sep{height:1px;background:var(--line);margin:4px 6px}

/* ===== Layout: sidebar + main ===== */
.layout{max-width:1240px;margin:0 auto;display:flex;align-items:flex-start}
.sidebar{width:252px;flex:none;align-self:stretch;padding:18px 14px 40px;position:sticky;top:var(--topbar-h);max-height:calc(100vh - var(--topbar-h));overflow:auto}
.sidebar .sb-h{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#8a8f9e;margin:14px 8px 7px}
.sidebar .sb-h-main{text-align:center;margin-top:10px}
.sidebar .sb-cat{text-align:left;margin:13px 8px 5px}
.sb-link{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:1px solid transparent;background:none;cursor:pointer;padding:9px 10px;border-radius:11px;color:var(--ink);font-size:14px}
.sb-link:hover{background:#fff;border-color:var(--line)}
.sb-link.active{background:#fff;border-color:var(--accent-l);box-shadow:var(--shadow)}
.sb-link .dot{width:11px;height:11px;border-radius:50%;flex:none;background:var(--qc,#9aa0b4);box-shadow:0 0 0 3px color-mix(in srgb,var(--qc,#9aa0b4) 18%,#fff)}
.sb-link .lab{flex:1;min-width:0}
.sb-link .lab .nm{font-weight:700;line-height:1.15}
.sb-link .lab .st{font-size:11.5px;color:#6a7188;margin-top:1px}
.sb-link .chk{font-size:12px;font-weight:800;color:var(--ok)}
.sb-link.home-link{font-weight:700;color:var(--accent-d)}
.sb-link.home-link svg{width:17px;height:17px}
.sb-foot{margin:18px 8px 0;font-size:11.5px;color:#9aa0b4;line-height:1.5}
.sb-credit{margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-size:10.5px;color:#a7adbe;line-height:1.45;font-style:italic}
.sb-credit sup{font-style:normal}
.sitefoot{text-align:center;font-size:11px;color:#a7adbe;padding:18px 16px 26px;line-height:1.5;border-top:1px solid var(--line);margin-top:8px;font-style:italic}
.sitefoot sup{font-style:normal}

main{flex:1;min-width:0;max-width:1000px;margin:0 auto;padding:20px 18px 120px}
.scrim{display:none}


.masthead{text-align:center;margin:8px 0 20px}
.masthead .kicker{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-l)}
.masthead h1{margin:8px 0 0;font-size:31px;font-weight:800;letter-spacing:-.012em;color:var(--accent-d);line-height:1.1}
.masthead.small h1{font-size:25px}
.masthead .subtitle{margin:7px auto 0;color:#6a7188;font-size:14px;font-weight:600;max-width:560px}
.masthead .rule{width:52px;height:3px;border-radius:3px;background:var(--accent);margin:15px auto 0}
.masthead .lead{margin:14px auto 0;color:#5b6178;font-weight:600;font-size:14.5px;max-width:560px}
@media(max-width:620px){.masthead h1{font-size:25px}}

.note{background:var(--cream);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:12px;padding:12px 15px;color:#4a4f66;font-size:13.8px;margin:14px 0 18px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px clamp(16px,3vw,26px);margin:0 0 18px}
.card h2{margin:0 0 4px;font-size:18px;color:var(--accent-d)}
.muted{color:#6a7188;font-size:13px}

/* ===== Identity form ===== */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin:8px 0}
.field label{font-weight:600;display:block;margin-bottom:4px;font-size:13.5px}
input[type=text],input[type=date]{width:100%;font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
input:focus{outline:2px solid var(--accent-l);outline-offset:1px;border-color:var(--accent-l)}

.bigstart{font:inherit;border:0;background:var(--accent);color:#fff;font-weight:700;font-size:16px;padding:14px 26px;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.bigstart:hover{background:var(--accent-d)}
.bigstart svg{width:18px;height:18px}

/* session synthesis */
.synth{display:flex;flex-direction:column;gap:9px}
.srow{display:grid;grid-template-columns:13px 1fr auto auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:11px 14px;background:#fff;cursor:pointer}
.srow:hover{border-color:var(--accent-l)}
.srow .sd{width:13px;height:13px;border-radius:50%;background:var(--qc,#9aa)}
.srow .snm{font-weight:700}
.srow .sst{font-size:12.5px;color:#6a7188}
.srow .ssc{font-weight:800;color:var(--accent-d);font-size:15px}
.badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px}
.badge.todo{background:#eef0f2;color:#6a7188}
.badge.doing{background:var(--tint);color:var(--accent-d)}
.badge.done{background:var(--ok-soft);color:#2f6b4c}

/* ===== Questionnaire head ===== */
.qhead{margin:2px 0 12px}
.qhead h2{margin:0;font-size:19px;color:var(--accent-d)}
.qhead .sub{margin:2px 0 0;color:#6a7188;font-size:13px;font-weight:600}
.insn{margin:10px 0 0;background:var(--tint);border:1px solid color-mix(in srgb,var(--accent) 30%,#fff);border-radius:10px;padding:10px 13px;color:var(--accent-ink);font-size:13.4px;line-height:1.5}

/* ===== Likert grid ===== */
.tblwrap{overflow:visible;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:var(--shadow);margin-top:6px}
.likert{width:100%;border-collapse:collapse;font-size:13px}
.likert th{background:var(--accent);color:#fff;font-weight:700;padding:7px 5px;border:1px solid color-mix(in srgb,var(--accent) 60%,#fff);text-align:center;font-size:11px;line-height:1.15;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.likert th.h-item{text-align:left;min-width:210px}
.likert thead th{position:sticky;top:var(--topbar-h);z-index:6;box-shadow:0 3px 4px -2px rgba(31,37,64,.22)}
.likert thead th:first-child{border-top-left-radius:11px}
.likert thead th:last-child{border-top-right-radius:11px}
.likert td{border:1px solid #e6e7f0;vertical-align:middle}
.likert td.itemnum{background:var(--tint);color:var(--accent-d);text-align:center;font-weight:700;width:30px;font-size:12px}
.likert td.itemtxt{padding:6px 10px;line-height:1.3;color:#2a2f47}
.likert td.likcell{text-align:center;width:54px;padding:3px}
.likert tr.qrow:nth-child(odd) td.itemtxt,.likert tr.qrow:nth-child(odd) td.likcell{background:#fafafd}
.cellradio{display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:26px;margin:0}
.cellradio input{position:absolute;opacity:0;width:0;height:0}
.tick{display:inline-block;width:19px;height:19px;border:1.7px solid var(--accent-l);border-radius:5px;background:#fff;box-sizing:border-box;position:relative;transition:.12s}
.cellradio:hover .tick{border-color:var(--accent)}
.cellradio input:checked+.tick{background:var(--accent);border-color:var(--accent-d)}
.cellradio input:checked+.tick::after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;border:2px solid #fff;border-top:0;border-left:0;transform:rotate(45deg);box-sizing:border-box}
.likert td.cmtcell{width:34px;text-align:center;padding:2px}
.cbtn{border:1px solid var(--line);background:#fff;color:#9aa0b4;width:28px;height:28px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0}
.cbtn:hover{border-color:var(--accent-l);color:var(--accent)}
.cbtn.has{background:var(--accent);border-color:var(--accent);color:#fff}
.cbtn svg{width:15px;height:15px}
.likert tr.qrow.miss td{background:#fdeee7!important}
.likert tr.qrow.miss td.itemnum{background:#f4c9b4!important}
.cmtrow td{padding:0;background:#fbfaf6}
.cmtbox{padding:8px 12px;display:flex;flex-direction:column;gap:5px}
.cmtbox label{font-size:12px;color:#6a7188;font-weight:600}
.cmtbox textarea{width:100%;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;resize:vertical;min-height:42px;background:#fff}
.cmtbox textarea:focus{outline:2px solid var(--accent-l);outline-offset:1px;border-color:var(--accent-l)}

.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px}
.actions .spacer{flex:1}
.btn{font:inherit;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:600;padding:11px 22px;border-radius:10px;cursor:pointer}
.btn:hover{background:var(--accent-d);border-color:var(--accent-d)}
.btn.ghost{background:#fff;color:var(--accent-d);border-color:var(--line)}
.btn.ghost:hover{border-color:var(--accent-l)}
.btn.danger{background:#fff;border-color:var(--danger-line);color:var(--danger-ink)}
.btn.danger:hover{background:var(--danger-soft)}

.flash{background:var(--danger-soft);border:1px solid var(--danger-line);border-left:5px solid var(--danger);border-radius:10px;padding:11px 14px;margin:0 0 14px;color:var(--danger-ink);font-size:13.5px}

/* ===== Results / cotation ===== */
.hdr-id{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 22px;font-size:14.5px;margin-top:4px}
@media(max-width:620px){.hdr-id{grid-template-columns:1fr}}
.hdr-id .k{color:#6a7188}

.qcard .tot{display:flex;align-items:baseline;gap:10px;margin:6px 0}
.qcard .tot .big{font-size:38px;font-weight:800;letter-spacing:-.02em;color:var(--accent-d)}
.qcard .tot .max{color:#6a7188;font-size:16px}
.band{border-radius:10px;padding:11px 15px;font-weight:700;margin:2px 0 10px;font-size:14.5px;border:1px solid}
.band.b0{background:var(--ok-soft);color:#2f6b4c;border-color:#c4e4d2}
.band.b1{background:var(--soft);color:var(--accent-d);border-color:color-mix(in srgb,var(--accent) 30%,#fff)}
.band.b2{background:var(--tint);color:var(--accent-d);border-color:color-mix(in srgb,var(--accent) 38%,#fff)}
.band.b3{background:#f7e2d3;color:#8a4a26;border-color:#eccbb3}
.nrbox{background:var(--danger-soft);border:1px solid var(--danger-line);color:var(--danger-ink);border-radius:10px;padding:9px 13px;font-size:13.5px;margin:0 0 10px}
.cmbox{background:var(--tint);border:1px solid color-mix(in srgb,var(--accent) 30%,#fff);color:var(--accent-ink);border-radius:10px;padding:9px 13px;font-size:13.5px;margin:0 0 10px}

.gauge{margin:8px 0 4px}
.gauge .track{position:relative;height:13px;border-radius:99px;background:var(--soft);overflow:visible}
.gauge .fill{position:absolute;left:0;top:0;bottom:0;border-radius:99px;background:linear-gradient(90deg,var(--accent-l),var(--accent-d))}
.gauge .mark{position:absolute;top:-5px;bottom:-5px;width:2px;background:var(--accent-d)}
.gauge .mark::after{content:attr(data-l);position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--accent-d);white-space:nowrap}
.gauge .ends{display:flex;justify-content:space-between;font-size:11px;color:#9aa0b4;margin-top:9px}

.sumgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:12px 0 4px}
@media(max-width:620px){.sumgrid{grid-template-columns:1fr}}
.sumcell{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;position:relative;overflow:hidden}
.sumcell::before{content:"";position:absolute;inset:0 auto 0 0;width:6px;background:var(--accent-l)}
.sumcell.flag::before{background:var(--accent-d)}
.sumcell .nm{font-size:12px;font-weight:800;color:var(--accent-l);text-transform:uppercase;letter-spacing:.04em;padding-left:6px}
.sumcell.flag .nm{color:var(--accent-d)}
.sumcell .v{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:4px 0 2px;padding-left:6px;color:var(--accent-d)}
.sumcell .v small{font-size:14px;color:#6a7188;font-weight:600}
.pill{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;margin-left:6px;vertical-align:middle}
.pill.pos{background:var(--tint);color:var(--accent-d)}
.pill.neg{background:var(--ok-soft);color:#2f6b4c}
.minibar{margin:8px 6px 0;height:9px;border-radius:99px;background:var(--soft);position:relative;overflow:visible}
.minibar .f{position:absolute;left:0;top:0;bottom:0;border-radius:99px;background:linear-gradient(90deg,var(--accent-l),var(--accent-d))}
.minibar .s{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--accent-d)}
.minibar .s::after{content:"seuil";position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--accent-d)}

.legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin:12px 0 6px;font-size:12.5px;color:#5b6178}
.legend .lg{display:inline-flex;align-items:center;gap:7px}
.legend .sw{width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.06);flex:none}
.ansrows{margin-top:6px;display:flex;flex-direction:column;gap:6px}
.arow{display:grid;grid-template-columns:34px 1fr 150px 46px;gap:12px;align-items:center;padding:8px 10px;border:1px solid var(--line);border-radius:11px;background:#fff;border-left-width:4px;border-left-color:var(--accent-l)}
.arow.rev{border-left-color:var(--accent-d);background:var(--soft)}
.arow.nr{border-left-color:#d9d4cb;background:#fafafa}
@media(max-width:640px){.arow{grid-template-columns:30px 1fr}.arow .ascale-wrap,.arow .apts{grid-column:2}.arow .apts{justify-self:start}}
.arow .anum{font-weight:800;color:var(--accent-d);text-align:center;font-size:13.5px}
.arow.nr .anum{color:#9aa09a}
.arow .atext{font-size:13.4px;line-height:1.3;color:#2a2f47}
.arow.nr .atext{color:#8f928f}
.tagx{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.02em;padding:1px 7px;border-radius:20px;white-space:nowrap;margin-left:6px;vertical-align:middle;background:var(--tint);color:var(--accent-d)}
.ascale{display:flex;flex-direction:column;gap:4px}
.ascale .segs{display:flex;gap:3px}
.ascale .seg{flex:1;height:9px;border-radius:3px;background:var(--soft)}
.arow .seg.sel{background:var(--accent)}
.arow.rev .seg.sel{background:var(--accent-d)}
.ascale .lbl{font-size:11px;color:#5b6178;font-weight:600}
.ascale.nrlbl .lbl{color:var(--danger);font-weight:700}
.apts{justify-self:center;min-width:38px;text-align:center;font-weight:800;font-size:13px;border-radius:8px;padding:4px 0;background:var(--soft);color:var(--accent-d)}
.apts.p0{background:#eef0ee;color:#9aa09a}
.acom{grid-column:2/-1;font-size:12.5px;color:var(--accent-ink);background:var(--tint);border-radius:8px;padding:6px 10px;font-style:italic}
.arow.add{border-left-color:var(--accent-l);background:#fbfafd}
.arow.add .anum{color:var(--accent-l)}

/* ===== Layout "blocs" (Y-BOCS) ===== */
.card.consignes{padding:18px clamp(16px,3vw,24px)}
.card.consignes h2{font-size:17px;margin-bottom:8px}
.card.consignes p{margin:0 0 9px;color:#42475e;font-size:13.6px;line-height:1.55}
.card.consignes ul{margin:4px 0 10px;padding-left:18px}
.card.consignes li{margin:4px 0;color:#42475e;font-size:13.4px;line-height:1.5}
.card.consignes .cnote{background:var(--tint);border:1px solid color-mix(in srgb,var(--accent) 28%,#fff);border-radius:10px;padding:9px 12px;color:var(--accent-ink);font-size:13px}
.card.consignes strong{color:var(--accent-d)}
.qsection{margin:24px 4px 10px}
.qsection h3{margin:0;font-size:15px;color:var(--accent-d);font-weight:800}
.qsection .snote{margin:3px 0 0;color:#6a7188;font-size:12.5px}
.qitem{border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow);padding:14px 16px;margin:0 0 12px}
.qitem.miss{border-color:var(--danger-line);background:var(--danger-soft)}
.qitem-head{display:flex;align-items:flex-start;gap:10px}

  {
    id:"DIVA5",
    category:"TDAH",
    title:"DIVA-5",
    subtitle:"Entretien diagnostique pour le TDAH chez l'adulte (DIVA-5)",
    lead:"Entretien structuré fondé sur les critères du DSM-5, coté par le clinicien — à l'âge adulte et dans l'enfance.",
    palette:{accent:"#1f5aa8", accentD:"#15407a", accentL:"#7ba3d4"},
    kind:"diva",
    consignes:{
      AT:"<h2>Consignes — Section 1 : Déficit attentionnel</h2>"
        +"<p>Posez chaque critère (A1 à A9) dans l'ordre. Pour chacun : lisez la question, évaluez le symptôme <strong>à l'âge adulte</strong> (présent depuis au moins 6 mois), puis <strong>dans l'enfance</strong> (entre 5 et 12 ans). Aidez-vous des exemples — cochez ceux que le patient reconnaît, notez les autres sous « Autre ».</p>"
        +"<p>Un symptôme est retenu s'il est d'<strong>allure chronique</strong> (non épisodique) et survient de manière plus fréquente ou plus intense que chez les personnes du même âge et de même niveau intellectuel. Complétez si possible par l'avis d'un proche ; les livrets scolaires peuvent aider pour l'enfance. C'est le jugement clinique qui détermine la réponse la plus appropriée.</p>",
      HI:"<h2>Consignes — Section 2 : Hyperactivité / Impulsivité</h2>"
        +"<p>Même principe que la Section 1 : pour chaque critère (H/I 1 à H/I 9), cotez le symptôme à l'âge adulte puis dans l'enfance, en vous appuyant sur les exemples. Le symptôme doit être d'allure chronique et non épisodique.</p>",

/* options par item : Y-BOCS définit it.opts=[{label,desc,score}] ; sinon on retombe sur q.opts + it.scores (RAADS) */
function optList(it,q){ return it.opts ? it.opts : q.opts.map((label,i)=>({label,score:it.scores[i]})); }
function optScore(it,i){ if(i==null||i<0) return 0; return it.opts ? it.opts[i].score : it.scores[i]; }
function itemMax(it,q){ const L=optList(it,q); return Math.max.apply(null,L.map(o=>o.score)); }
function itemCore(it){ return it.core!==false; }

function ensure(qid){
  if(!STORE[qid]){

    else { STORE[qid]={ans:new Array(q.items.length).fill(null),comments:new Array(q.items.length).fill("")}; }
  }
  return STORE[qid];
}

  const d=ensure(qid);
  if(!d.annex){ d.annex={chk:{}, cibles:{obs:["","","",""],comp:["","","",""],evit:""}}; }
  return d.annex;
}

function frDate(iso){ if(!iso)return '—'; const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(iso); return m?(m[3]+'/'+m[2]+'/'+m[1]):iso; }
function todayISO(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
function safeName(prefix){const p=session.patient; const base=((p.nom||'')+'_'+(p.prenom||'')).replace(/[^A-Za-z0-9_\-]/g,'').slice(0,40)||'patient'; return prefix+'_'+base;}
function stamp(){const t=new Date();const z=n=>String(n).padStart(2,'0');return t.getFullYear()+'-'+z(t.getMonth()+1)+'-'+z(t.getDate())+'_'+z(t.getHours())+'h'+z(t.getMinutes());}
function answered(qid){ const q=QMAP[qid]; if(q.kind==='diva') return divaAnswered(qid); return ensure(qid).ans.filter(v=>v!==null).length;}
function totalCount(qid){ const q=QMAP[qid]; if(q.kind==='diva') return divaTotal(); return q.items.length;}
function isComplete(qid){return answered(qid)===totalCount(qid);}
function isStarted(qid){return answered(qid)>0;}

/* ---------- accent ---------- */
function applyAccent(pal){
  const r=document.documentElement.style;
  r.setProperty('--accent',pal.accent);
  r.setProperty('--accent-d',pal.accentD);
  r.setProperty('--accent-l',pal.accentL);
}

/* ---------- scoring ---------- */
function computeScores(q){
  const d=ensure(q.id); let total=0; const sub={}; const nr=[]; const com=[]; const extras=[];
  q.items.forEach((it,i)=>{
    const sel=d.ans[i];
    const sc = sel===null?0:optScore(it,sel);
    if(itemCore(it)){
      if(sel===null){ nr.push(it.n); }
      else { total+=sc; if(it.cat) sub[it.cat]=(sub[it.cat]||0)+sc; }
    } else {
      extras.push({n:it.n,text:it.text,sel,score:sc,max:itemMax(it,q),label: sel===null?null:optList(it,q)[sel].label});
    }
    if(d.comments[i] && d.comments[i].trim()) com.push(it.n);
  });
  return {total,sub,nr,com,extras};
}
function band(q,t){const B=q.scoring.bands;for(let i=0;i<B.length;i++){if(t>=B[i][0]&&t<=B[i][1])return{txt:B[i][2],idx:i};}return{txt:'—',idx:0};}
function bandClass(q,idx){const n=q.scoring.bands.length; const r=idx/(n-1||1); if(r<=0.18)return 'b0'; if(r<=0.5)return 'b1'; if(r<=0.72)return 'b2'; return 'b3';}

  const cats=[], byCat={};
  REGISTRY.forEach(q=>{ const c=q.category||'Autres'; if(!byCat[c]){byCat[c]=[];cats.push(c);} byCat[c].push(q); });
  cats.forEach(cat=>{
    h+='<div class="sb-h sb-cat">'+esc(cat)+'</div>';

/* ---------- onglets selon le type de questionnaire ---------- */
function tabsFor(q){
  if(q.kind==='diva') return [{v:'at',label:'Attention'},{v:'hi',label:'Hyperactivité / Impulsivité'},{v:'fn',label:'Fonctionnement'},{v:'results',label:'Cotation'}];
  if(q.annexes) return [{v:'annexes',label:'Annexes'},{v:'quest',label:'Questionnaire'},{v:'results',label:'Cotation'}];
  return [{v:'quest',label:'Questionnaire'},{v:'results',label:'Cotation'}];
}

/* ---------- dispatcher ---------- */
function render(){
  window.scrollTo(0,0);
  refreshChrome();
  if(session.view==="home") return renderHome();
  const q=QMAP[session.current];
  if(q && q.kind==='diva'){
    if(session.view==='at') return renderDivaSymptoms(q,'AT');
    if(session.view==='hi') return renderDivaSymptoms(q,'HI');
    if(session.view==='fn') return renderDivaFunc(q);
    if(session.view==='results') return renderResults(q);
    return renderDivaSymptoms(q,'AT');
  }
  if(session.view==="annexes") return renderAnnexes(q);
  if(session.view==="results") return renderResults(q);
  return renderQuest(q);
}

function renderQuest(q){

  const d=ensure(q.id);
  let head='<tr><th></th><th class="h-item">Items</th>';
  q.opts.forEach(o=>head+='<th>'+esc(o)+'</th>');
  head+='<th></th></tr>';
  let rows='';
  q.items.forEach((it,i)=>{
    let cells='';
    q.opts.forEach((o,ci)=>{

    });

  });

  app.innerHTML=questMasthead(q)
    +'<div class="card">'
    +'<div class="qhead"><div class="insn">'+esc(q.instructions||'')+'</div></div>'
    +'<div class="tblwrap"><table class="likert"><thead>'+head+'</thead><tbody>'+rows+'</tbody></table></div>'
    +questActions()+'</div>';

    tbody.querySelectorAll('input[name="q_'+i+'"]').forEach(r=>r.checked=false);
    if(was){ d.ans[i]=null; } else { inp.checked=true; d.ans[i]=+inp.value; tr.classList.remove('miss'); }
    refreshChrome();
  });
  wireQuestActions(q);
}

/* ---------- ANNEXES (préambule : check-list + symptômes-cibles) ---------- */
function chkRow(key,label,ann,isCat){
  const s=ann.chk[key]||{}; const hasC=s.c&&s.c.trim();
  return '<div class="chk-row'+(isCat?' cat':'')+'" data-k="'+key+'">'
    +'<span class="chk-lab">'+esc(label)+'</span>'
    +'<span class="cks">'
    +'<button class="ck a'+(s.a?' on':'')+'" data-f="a">Actuelle</button>'
    +'<button class="ck p'+(s.p?' on':'')+'" data-f="p">Passée</button>'
    +'<button class="cbtn'+(hasC?' has':'')+'" data-f="c" title="Commentaire" aria-label="Commentaire">'+CICON+'</button>'
    +'</span></div>'
    +(hasC?'<div class="chk-cmt" data-for="'+key+'"><textarea rows="1" placeholder="Précisez…">'+esc(s.c)+'</textarea></div>':'');
}
function chkBlock(prefix,groups,ann){
  let h='';
  groups.forEach((g,gi)=>{
    if(g.items && g.items.length){
      h+='<div class="chk-cat-h">'+esc(g.cat)+'</div>';
      g.items.forEach((it,ii)=>{ h+=chkRow(prefix+gi+'_'+ii,it,ann,false); });
    } else {
      h+=chkRow(prefix+gi+'_h',g.cat,ann,true);
    }
  });
  return h;
}
function renderAnnexes(q){
  const ann=ensureAnnex(q.id); const A=q.annexes;
  let h=questMasthead(q).replace('Hétéro-questionnaire · passation','Annexes · préambule');
  if(A.intro) h+='<div class="note">'+esc(A.intro)+'</div>';

  // Annexe 1
  h+='<div class="card"><h2>Annexe 1 — Liste des obsessions et compulsions</h2>'
    +'<p class="muted" style="margin-bottom:6px">Pour chaque symptôme présent, cochez <strong>Actuelle</strong> et/ou <strong>Passée</strong>. Le bouton note permet d\'ajouter une précision.</p>'
    +'<div class="chk-sec"><div class="chk-sec-h">Obsessions</div>'+chkBlock('o',A.checklist.obsessions,ann)+'</div>'
    +'<div class="chk-sec"><div class="chk-sec-h">Compulsions</div>'+chkBlock('c',A.checklist.compulsions,ann)+'</div>'
    +'</div>';

  // Annexe 2
  const cibField=(grp,i,val)=>'<div class="cib-row"><label>Problème '+(i+1)+'</label><input type="text" data-cg="'+grp+'" data-ci="'+i+'" value="'+esc(val||'')+'"></div>';
  h+='<div class="card"><h2>Annexe 2 — Symptômes cibles</h2>'
    +'<p class="muted" style="margin-bottom:10px">Symptômes retenus comme cibles de l\'entretien et du suivi.</p>'
    +'<div class="cib-grp"><div class="cib-h">Obsessions</div>'+[0,1,2,3].map(i=>cibField('obs',i,ann.cibles.obs[i])).join('')+'</div>'
    +'<div class="cib-grp"><div class="cib-h">Compulsions</div>'+[0,1,2,3].map(i=>cibField('comp',i,ann.cibles.comp[i])).join('')+'</div>'
    +'<div class="cib-grp"><div class="cib-h">Évitement</div><textarea id="cibEvit" rows="3" placeholder="Conduites d\'évitement…">'+esc(ann.cibles.evit||'')+'</textarea></div>'
    +'</div>';

  h+='<div class="actions"><span class="spacer"></span><button class="btn" id="toQuest">Passer au questionnaire &#8594;</button></div>';
  app.innerHTML=h;

  // wiring check-list (délégation)
  app.querySelectorAll('.chk-sec').forEach(sec=>{
    sec.addEventListener('click',e=>{
      const btn=e.target.closest('button'); if(!btn)return;
      const row=btn.closest('.chk-row'); if(!row)return;
      const key=row.dataset.k, f=btn.dataset.f;
      if(!ann.chk[key]) ann.chk[key]={a:false,p:false,c:""};
      const s=ann.chk[key];
      if(f==='a'||f==='p'){ s[f]=!s[f]; btn.classList.toggle('on',s[f]); }
      else if(f==='c'){
        let box=row.nextElementSibling;
        if(box && box.classList.contains('chk-cmt')){ box.remove(); }
        else {
          box=document.createElement('div'); box.className='chk-cmt'; box.dataset.for=key;
          box.innerHTML='<textarea rows="1" placeholder="Précisez…"></textarea>';
          row.after(box);
          const ta=box.querySelector('textarea'); ta.value=s.c||''; ta.focus();
          ta.addEventListener('input',()=>{ s.c=ta.value; btn.classList.toggle('has',!!ta.value.trim()); });
        }
      }
    });
    sec.querySelectorAll('.chk-cmt').forEach(box=>{
      const key=box.dataset.for; const ta=box.querySelector('textarea');
      ta.addEventListener('input',()=>{ if(!ann.chk[key])ann.chk[key]={a:false,p:false,c:""}; ann.chk[key].c=ta.value;
        const b=app.querySelector('.chk-row[data-k="'+key+'"] .cbtn'); if(b)b.classList.toggle('has',!!ta.value.trim()); });
    });
  });

  // wiring symptômes-cibles
  app.querySelectorAll('input[data-cg]').forEach(inp=>{
    inp.addEventListener('input',()=>{ ann.cibles[inp.dataset.cg][+inp.dataset.ci]=inp.value; });
  });
  const ev=document.getElementById('cibEvit'); if(ev) ev.addEventListener('input',()=>{ ann.cibles.evit=ev.value; });
  document.getElementById('toQuest').onclick=()=>setView('quest');
}

function toggleComment(q,btn){
  const d=ensure(q.id);
  const block=btn.closest('.qitem');
  if(block){ // layout blocs
    const i=+btn.dataset.ci;
    const ex=block.querySelector('.cmtbox');
    if(ex){ ex.remove(); return; }
    const box=document.createElement('div'); box.className='cmtbox';
    box.innerHTML='<label>Note clinique (facultative)</label><textarea rows="2"></textarea>';
    block.appendChild(box);
    const ta=box.querySelector('textarea'); ta.value=d.comments[i]||''; ta.focus();
    ta.addEventListener('input',()=>{ d.comments[i]=ta.value; btn.classList.toggle('has', !!ta.value.trim()); });

  }

function missingNums(q){const d=ensure(q.id);const a=[];d.ans.forEach((v,i)=>{if(v===null)a.push(q.items[i].n);});return a;}
function trySubmit(q){
  const miss=missingNums(q);
  if(miss.length===0){ setView("results"); return; }
  showModal('<h2>Réponses incomplètes</h2>'
    +'<p>'+miss.length+' item(s) sans réponse. Vous pouvez revenir les compléter, ou afficher la cotation maintenant (les items sans réponse seront comptés 0).</p>'
    +'<div class="mf"><button class="btn ghost" id="msee">Voir les items manquants</button><button class="btn" id="mgo">Coter quand même</button></div>');
  document.getElementById('mgo').onclick=()=>{ closeModal(); setView("results"); };
  document.getElementById('msee').onclick=()=>{
    closeModal();
    ensure(q.id).ans.forEach((v,i)=>{ if(v===null){ const c=app.querySelector('[data-i="'+i+'"]'); if(c)c.classList.add('miss'); } });
    showFlash('Items sans réponse surlignés ci-dessous : n° '+miss.join(', ')+'.');

  };
}
function confirmReset(q){
  showModal('<h2>Réinitialiser '+esc(q.title)+' ?</h2>'
    +'<p>Toutes les réponses et notes de ce questionnaire seront effacées. L\'identité du patient et les autres questionnaires sont conservés.</p>'
    +'<div class="mf"><button class="btn ghost" id="rno">Annuler</button><button class="btn danger" id="ryes">Tout effacer</button></div>');

function showFlash(msg){

  if(!b){ b=document.createElement('div'); b.id='flash'; b.className='flash no-print';
    const mh=app.querySelector('.masthead');
    if(mh) mh.after(b); else app.insertBefore(b,app.firstChild);

}

   DIVA-5 (module dédié)
   ============================================================ */
function newDivaState(q){
  const symp={};
  q.attention.concat(q.hyper).forEach(it=>{ symp[it.id]={a:null,c:null,aex:{},cex:{},aoth:"",coth:"",note:""}; });
  return { symp, func:{
    onset:null, onsetAge:"",
    cdom:{}, impairAdult:null, impairChild:null,
    critE:null, critEwhich:"",
    collat:{parent:"",partner:"",school:""}, collatParentWho:"", collatPartnerWho:"",
    dx:"", remission:false, severity:"", notes:""
  }};
}
function divaItems(q){ return q.attention.concat(q.hyper); }
function divaAnswered(qid){
  const q=QMAP[qid], d=ensure(qid); let n=0;
  divaItems(q).forEach(it=>{ const s=d.symp[it.id]; if(s){ if(s.a!==null)n++; if(s.c!==null)n++; } });
  const f=d.func; [f.onset,f.impairAdult,f.impairChild].forEach(v=>{ if(v!==null&&v!=='') n++; });
  return n;
}
function divaTotal(){ return 18*2 + 3; }
function divaCounts(q){
  const d=ensure(q.id);
  const cnt=(arr,k)=>arr.reduce((s,it)=>s+(d.symp[it.id]&&d.symp[it.id][k]===true?1:0),0);
  return { aAdult:cnt(q.attention,'a'), aChild:cnt(q.attention,'c'), hiAdult:cnt(q.hyper,'a'), hiChild:cnt(q.hyper,'c') };
}
function divaPresentation(c){
  const aA=c.aAdult>=5, hiA=c.hiAdult>=5;
  if(aA&&hiA) return {k:'comb',code:'314.01',label:'Présentation combinée'};
  if(aA&&!hiA) return {k:'inatt',code:'314.00',label:'Présentation inattentive prédominante'};
  if(!aA&&hiA) return {k:'hyper',code:'314.01',label:'Présentation hyperactive / impulsive prédominante'};
  return null;
}

    +'</div>';

  // Conclusions générales (texte libre, repris dans le PDF si non vide)
  h+='<div class="card"><h2>Conclusions générales</h2>'
    +'<p class="muted" style="margin-bottom:8px">Texte libre : synthèse de l\'entretien, informations collatérales, éléments cliniques. Apparaîtra dans le PDF (omise si laissée vide).</p>'
    +'<textarea id="divaNotes" rows="5" placeholder="Conclusions de l\'entretien…">'+esc(f.notes||'')+'</textarea></div>';

  h+='<div class="actions"><button class="btn ghost" id="fnPrev">&#8592; Hyperactivité / Impulsivité</button><span class="spacer"></span><button class="btn" id="toCot">Voir la cotation &#8594;</button></div>';

    if(yn){ const grp=yn.closest('.yn').dataset.yn; const val=yn.dataset.v==='1';
      const map={onset:'onset',a:null,impA:'impairAdult',impC:'impairChild',critE:'critE'}; const fld=map[grp]; if(!fld)return;
      const nv=(f[fld]===val)?null:val; f[fld]=nv;

    const cd=e.target.closest('.exrow[data-cdom]');
    if(cd){ const k=cd.dataset.cdom; f.cdom[k]=!f.cdom[k]; cd.classList.toggle('on',!!f.cdom[k]); return; }

  app.querySelectorAll('input[data-cdomoth]').forEach(inp=>inp.addEventListener('input',()=>{ f.cdom[inp.dataset.cdomoth]=inp.value; }));
  const oa=document.getElementById('onsetAge'); if(oa) oa.addEventListener('input',()=>f.onsetAge=oa.value);
  const ce=document.getElementById('critEwhich'); if(ce) ce.addEventListener('input',()=>f.critEwhich=ce.value);

  const nt=document.getElementById('divaNotes'); if(nt) nt.addEventListener('input',()=>f.notes=nt.value);

/* ============================================================
   COTATION — HTML réutilisable (écran + PDF)
   ============================================================ */
function annexEntries(q){
  const d=ensure(q.id); const ann=d.annex; if(!ann) return null;
  const A=q.annexes; const out={obs:[],comp:[]};
  const scan=(prefix,groups,bucket)=>{
    groups.forEach((g,gi)=>{
      if(g.items && g.items.length){
        g.items.forEach((it,ii)=>{ const s=ann.chk[prefix+gi+'_'+ii]; if(s&&(s.a||s.p||(s.c&&s.c.trim()))) bucket.push({cat:g.cat,label:it,s}); });
      } else {
        const s=ann.chk[prefix+gi+'_h']; if(s&&(s.a||s.p||(s.c&&s.c.trim()))) bucket.push({cat:null,label:g.cat,s});
      }
    });
  };
  scan('o',A.checklist.obsessions,out.obs);
  scan('c',A.checklist.compulsions,out.comp);
  out.cibles=ann.cibles;
  return out;
}
function annexesSummaryHTML(q){
  if(!q.annexes) return '';
  const e=annexEntries(q); if(!e) return '';
  const cib=e.cibles||{obs:[],comp:[],evit:""};
  const hasCib = (cib.obs||[]).concat(cib.comp||[]).some(x=>x&&x.trim()) || (cib.evit&&cib.evit.trim());
  if(!e.obs.length && !e.comp.length && !hasCib) return '';
  const tag=s=>'<span class="ap">'+(s.a?'<span class="apa">Actuelle</span>':'')+(s.p?'<span class="app">Passée</span>':'')+'</span>';
  const rowsOf=arr=>arr.map(x=>'<div class="sx-row"><div class="sx-l">'+(x.cat?'<span class="sx-cat">'+esc(x.cat)+'</span> ':'')+esc(x.label)+'</div>'+tag(x.s)+((x.s.c&&x.s.c.trim())?'<div class="sx-c">'+esc(x.s.c.trim())+'</div>':'')+'</div>').join('');
  let html='<div class="card"><h2>Annexe 1 — Symptômes relevés</h2>';
  if(e.obs.length) html+='<div class="sx-h">Obsessions</div>'+rowsOf(e.obs);
  if(e.comp.length) html+='<div class="sx-h">Compulsions</div>'+rowsOf(e.comp);
  if(!e.obs.length && !e.comp.length) html+='<p class="muted">Aucun symptôme coché.</p>';
  html+='</div>';
  const cibList=arr=>arr.map((v,i)=>(v&&v.trim())?'<li><strong>Problème '+(i+1)+' :</strong> '+esc(v.trim())+'</li>':'').join('');
  if(hasCib){
    const ho=cibList(cib.obs||[]), hc=cibList(cib.comp||[]);
    html+='<div class="card"><h2>Annexe 2 — Symptômes cibles</h2>';
    if(ho) html+='<div class="sx-h">Obsessions</div><ul class="cibul">'+ho+'</ul>';
    if(hc) html+='<div class="sx-h">Compulsions</div><ul class="cibul">'+hc+'</ul>';
    if(cib.evit&&cib.evit.trim()) html+='<div class="sx-h">Évitement</div><p class="cibevit">'+esc(cib.evit.trim())+'</p>';
    html+='</div>';
  }
  return html;
}

    +'<h2>'+esc(q.title)+' — score total</h2>'

    +'<div class="gauge"><div class="track"><div class="fill" style="width:'+pct+'%"></div>';
  (S.marks||[]).forEach(v=>{ html+='<div class="mark" data-l="'+v+'" style="left:'+markPct(v)+'%"></div>'; });
  html+='</div><div class="ends"><span>0</span><span>'+S.totalMax+'</span></div></div>';
  if(nr.length)html+='<div class="nrbox"><strong>Items sans réponse</strong> (comptés 0 dans le score) : n° '+nr.join(', ')+'.</div>';
  if(com.length)html+='<div class="cmbox"><strong>Notes du soignant</strong> : n° '+com.join(', ')+' — voir le détail ci-dessous.</div>';

  if(S.subscales){
    html+='<div class="sumgrid">';
    (S.subOrder||Object.keys(S.subscales)).forEach(code=>{
      const def=S.subscales[code]; const label=def[0],seuil=def[1],mx=def[2]; const v=sub[code]||0;
      const hasSeuil=(seuil!==null&&seuil!==undefined);

      const vp=Math.max(0,Math.min(100,v/mx*100)); const sp=hasSeuil?Math.max(0,Math.min(100,seuil/mx*100)):0;
      html+='<div class="sumcell '+(flag?'flag':'')+'">'
        +'<div class="nm">'+esc(label)+' <span style="opacity:.7">('+code+')</span>'+(hasSeuil?(flag?'<span class="pill pos">&#8805; seuil</span>':'<span class="pill neg">&lt; seuil</span>'):'')+'</div>'
        +'<div class="v">'+v+'<small> / '+mx+'</small></div>'
        +'<div class="minibar"><div class="f" style="width:'+vp+'%"></div>'+(hasSeuil?'<div class="s" style="left:'+sp+'%"></div>':'')+'</div>'
        +(hasSeuil?'<div class="muted" style="padding-left:6px;margin-top:14px">Seuil : '+seuil+'</div>':'<div class="muted" style="padding-left:6px;margin-top:14px">Sous-total</div>')
        +'</div>';
    });
    html+='</div>';
  }
  html+='</div>'; // close qcard

  /* items additionnels (hors score total) */
  if(extras && extras.length){
    html+='<div class="card"><h2>Items additionnels (hors score total)</h2>'
      +'<p class="muted" style="margin-bottom:12px">Items complémentaires (heuristiques) : non inclus dans le score total Y-BOCS (items 1–10).</p>'
      +'<div class="sumgrid">';
    extras.forEach(x=>{
      const vp = x.max? Math.max(0,Math.min(100,x.score/x.max*100)):0;
      html+='<div class="sumcell">'
        +'<div class="nm">'+x.n+'. '+esc(x.text)+'</div>'
        +'<div class="v">'+(x.sel===null?'—':x.score)+'<small> / '+x.max+'</small></div>'
        +'<div class="minibar"><div class="f" style="width:'+vp+'%"></div></div>'
        +'<div class="muted" style="padding-left:6px;margin-top:14px">'+(x.label?esc(x.label):'Sans réponse')+'</div>'
        +'</div>';
    });
    html+='</div></div>';
  }

  // detail
  const hasRev=q.items.some(isReverse); const hasExtra=extras&&extras.length;
  let legend='<span class="lg"><span class="sw" style="background:'+q.palette.accent+'"></span>'+(hasExtra?'Item du score total':'Item standard')+'</span>';
  if(hasRev) legend+='<span class="lg"><span class="sw" style="background:'+q.palette.accentD+'"></span>'+esc(S.reverseLabel||'Item inversé')+'</span>';
  if(hasExtra) legend+='<span class="lg"><span class="sw" style="background:'+q.palette.accentL+'"></span>Item additionnel (hors score)</span>';
  legend+='<span class="lg"><span class="sw" style="background:#d9d4cb"></span>Sans réponse</span>';
  html+='<div class="card"><h2>Réponses détaillées</h2><div class="legend">'+legend+'</div>';
  html+='<details open><summary>Afficher / masquer les '+q.items.length+' items</summary><div class="ansrows">';
  const d=ensure(q.id);
  q.items.forEach((it,i)=>{
    const sel=d.ans[i]; const rev=isReverse(it); const add=!itemCore(it); const L=optList(it,q);
    const cls=sel===null?'nr':(add?'add':(rev?'rev':''));
    const pts=sel===null?0:optScore(it,sel);
    let segs='';
    for(let s=0;s<L.length;s++) segs+='<span class="seg'+(sel===s?' sel':'')+'"></span>';
    const lab=sel===null?'<span style="color:var(--danger);font-weight:700">Sans réponse</span>':esc(L[sel].label||L[sel].desc||'');
    const tag = rev?'<span class="tagx">inversé</span>':(add?'<span class="tagx">additionnel</span>':'');
    const note=(d.comments[i]&&d.comments[i].trim())?'<div class="acom">Note : '+esc(d.comments[i].trim())+'</div>':'';
    html+='<div class="arow '+cls+'"><div class="anum">'+it.n+'</div>'
      +'<div class="atext">'+esc(it.text)+tag+'</div>'
      +'<div class="ascale-wrap ascale '+(sel===null?'nrlbl':'')+'"><div class="segs">'+segs+'</div><div class="lbl">'+lab+'</div></div>'
      +'<div class="apts p'+pts+'">'+pts+'</div>'+note+'</div>';
  });
  html+='</div></details>';
  if(S.details)html+='<details><summary>Repères d\'interprétation (score total)</summary><div class="interp">'+esc(S.details)+'</div></details>';
  if(S.subscales)html+='<details><summary>Sous-échelles</summary><div class="interp">'+(S.subOrder||Object.keys(S.subscales)).map(c=>{const def=S.subscales[c];const seuil=def[1];return def[0]+' ('+c+') — '+(seuil!==null&&seuil!==undefined?('seuil '+seuil+' · '):'')+'max '+def[2];}).join('\n')+(S.note?('\n\n'+S.note):'')+'</div></details>';
  html+='</div>';
  return html;
}

function renderResults(q){
  let html = q.kind==='diva' ? divaResultsHTML(q) : resultsHTML(q);
  html+='<div class="actions no-print">'
    +'<button class="btn ghost" id="back">&#8592; Modifier les réponses</button>'
    +'<span class="spacer"></span>'
    +'<button class="btn" id="printOne">Imprimer / PDF (ce questionnaire)</button>'
    +'</div>';
  app.innerHTML=html;
  document.getElementById('back').onclick=()=>setView(q.kind==='diva'?'at':'quest');
  document.getElementById('printOne').onclick=()=>printScope('q');
}

/* ============================================================
   ENREGISTRER / REPRENDRE (.json)
   ============================================================ */
function download(name,obj){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function qData(qid){
  const d=ensure(qid);
  if(QMAP[qid].kind==='diva') return {diva:JSON.parse(JSON.stringify(d))};
  const o={ans:d.ans.slice(),comments:d.comments.slice()}; if(d.annex) o.annex=JSON.parse(JSON.stringify(d.annex)); return o;
}
function saveQuestionnaire(qid){
  download(safeName(qid)+'_'+stamp(),{
    type:"questionnaire",app:"hetero-cmp",version:1,savedAt:new Date().toISOString(),
    questionnaire:qid,patient:Object.assign({},session.patient),data:qData(qid)
  });
  toast('Questionnaire '+QMAP[qid].title+' enregistré (.json)');
}
function saveSession(){
  const data={}; REGISTRY.forEach(q=>{ if(STORE[q.id]) data[q.id]=qData(q.id); });
  download(safeName('Session')+'_'+stamp(),{
    type:"session",app:"hetero-cmp",version:1,savedAt:new Date().toISOString(),
    patient:Object.assign({},session.patient),data:data
  });
  toast('Session enregistrée (.json)');
}
function resumeFromFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    let obj; try{ obj=JSON.parse(reader.result); }catch(e){ toast('Fichier illisible : JSON invalide.'); return; }
    if(!obj||obj.app!=='hetero-cmp'){
      // tolérant : on tente quand même si la structure ressemble
      if(!obj || (!obj.data && !obj.questionnaire)){ toast('Fichier non reconnu.'); return; }
    }
    if(obj.type==='questionnaire' && obj.questionnaire){
      const qid=obj.questionnaire;
      if(!QMAP[qid]){ toast('Questionnaire « '+qid+' » inconnu dans cette version.'); return; }
      const apply=()=>{
        if(obj.patient && (obj.patient.nom||obj.patient.prenom||obj.patient.naissance)) session.patient=Object.assign({nom:"",prenom:"",naissance:"",dateJour:""},obj.patient);
        STORE[qid]=normalizeQ(qid,obj.data);
        openQuestionnaire(qid);
        toast('Questionnaire '+QMAP[qid].title+' repris.');
      };
      if(isStarted(qid)){
        showModal('<h2>Reprendre '+esc(QMAP[qid].title)+' ?</h2><p>Ce questionnaire contient déjà des réponses. Les remplacer par celles du fichier ?</p><div class="mf"><button class="btn ghost" id="cno">Annuler</button><button class="btn" id="cyes">Remplacer</button></div>');
        document.getElementById('cno').onclick=closeModal;
        document.getElementById('cyes').onclick=()=>{closeModal();apply();};
      } else apply();
    }
    else if(obj.data && typeof obj.data==='object'){
      const apply=()=>{
        session.patient=Object.assign({nom:"",prenom:"",naissance:"",dateJour:""},obj.patient||{});
        Object.keys(STORE).forEach(k=>delete STORE[k]);
        let count=0;
        Object.keys(obj.data).forEach(qid=>{ if(QMAP[qid]){ STORE[qid]=normalizeQ(qid,obj.data[qid]); count++; } });
        goHome();
        toast('Session reprise : '+count+' questionnaire(s).');
      };
      const hasExisting = session.patient.nom||session.patient.prenom||Object.keys(STORE).length;
      if(hasExisting){
        showModal('<h2>Reprendre une session ?</h2><p>La session en cours (patient + questionnaires) sera remplacée par le contenu du fichier.</p><div class="mf"><button class="btn ghost" id="cno">Annuler</button><button class="btn" id="cyes">Remplacer</button></div>');
        document.getElementById('cno').onclick=closeModal;
        document.getElementById('cyes').onclick=()=>{closeModal();apply();};
      } else apply();
    }
    else toast('Fichier non reconnu.');
  };
  reader.readAsText(file);
}
function normalizeQ(qid,data){
  const q=QMAP[qid];
  if(q.kind==='diva'){
    const base=newDivaState(q);
    const src=data&&data.diva;
    if(src){
      if(src.symp) Object.keys(base.symp).forEach(k=>{ if(src.symp[k]) base.symp[k]=Object.assign(base.symp[k],src.symp[k]); });
      if(src.func) base.func=Object.assign(base.func,src.func);
    }
    return base;
  }
  const n=q.items.length;
  const ans=new Array(n).fill(null), comments=new Array(n).fill("");
  if(data){
    if(Array.isArray(data.ans)) for(let i=0;i<n;i++) ans[i]=(i<data.ans.length && data.ans[i]!=null)?data.ans[i]:null;
    if(Array.isArray(data.comments)) for(let i=0;i<n;i++) comments[i]=(i<data.comments.length && data.comments[i]!=null)?data.comments[i]:"";
  }
  const out={ans,comments};
  if(q.annexes){
    const a={chk:{}, cibles:{obs:["","","",""],comp:["","","",""],evit:""}};
    const src=data&&data.annex;
    if(src){
      if(src.chk && typeof src.chk==='object'){ Object.keys(src.chk).forEach(k=>{ const s=src.chk[k]||{}; a.chk[k]={a:!!s.a,p:!!s.p,c:typeof s.c==='string'?s.c:""}; }); }
      if(src.cibles){
        ['obs','comp'].forEach(g=>{ if(Array.isArray(src.cibles[g])) for(let i=0;i<4;i++) a.cibles[g][i]=src.cibles[g][i]||""; });
        if(typeof src.cibles.evit==='string') a.cibles.evit=src.cibles.evit;
      }
    }
    out.annex=a;
  }
  return out;
}

/* ============================================================
   PDF (impression)
   ============================================================ */
function printScope(scope){
  let qids;
  if(scope==='q'){ if(!session.current){toast('Ouvrez un questionnaire d\'abord.');return;} qids=[session.current]; }
  else { qids=REGISTRY.filter(q=>isStarted(q.id)).map(q=>q.id); if(!qids.length){toast('Aucun questionnaire entamé à imprimer.');return;} }

  const holder=document.createElement('div'); holder.id='printHolder';
  qids.forEach(qid=>{ const sec=document.createElement('section'); sec.className='printq'; sec.innerHTML=(QMAP[qid].kind==='diva'?divaResultsHTML(QMAP[qid]):resultsHTML(QMAP[qid])); holder.appendChild(sec); });

  // références (en petit, en fin de document)
  let refHTML='';
  qids.forEach(qid=>{
    const q=QMAP[qid];
    if(q.references && q.references.length){
      refHTML+='<div class="refblock"><div class="reftitle">'+esc(q.title)+' — Références</div>';
      if(q.source) refHTML+='<div class="refsrc">'+esc(q.source)+'</div>';
      refHTML+='<ol class="reflist">'+q.references.map(r=>'<li>'+esc(r)+'</li>').join('')+'</ol></div>';
    }
  });
  if(refHTML){ const rf=document.createElement('section'); rf.className='printrefs'; rf.innerHTML=refHTML; holder.appendChild(rf); }

  const prevApp=app.innerHTML; const prevTitle=document.title;
  app.innerHTML=''; app.appendChild(holder);
  document.title=(scope==='q'?session.current:'Session')+'_'+safeName('').replace(/^_/,'');
  closeAllPops(); closeNav();
  window.print();
  setTimeout(()=>{ document.title=prevTitle; render(); },600);
}

/* ============================================================
   POPOVERS / TOAST / MODAL / NAV
   ============================================================ */
const popSave=document.getElementById('popSave');
const popPdf=document.getElementById('popPdf');
const toolsEl=document.querySelector('.tools');
function placePop(pop,btn,align){
  if(align==='right'){ pop.style.left='auto'; pop.style.right=(toolsEl.clientWidth-(btn.offsetLeft+btn.offsetWidth))+'px'; }
  else { pop.style.right='auto'; pop.style.left=btn.offsetLeft+'px'; }
}
function closeAllPops(){ popSave.classList.remove('show'); popPdf.classList.remove('show'); }
function togglePop(pop,btn,align){ const open=pop.classList.contains('show'); closeAllPops(); if(!open){ placePop(pop,btn,align); pop.classList.add('show'); } }

document.getElementById('btnSave').onclick=function(e){e.stopPropagation();togglePop(popSave,this,'left');};
document.getElementById('btnPdf').onclick=function(e){e.stopPropagation();togglePop(popPdf,this,'right');};
document.getElementById('btnResume').onclick=function(){closeAllPops();fileInput.value='';fileInput.click();};
fileInput.onchange=e=>{ const f=e.target.files[0]; if(f) resumeFromFile(f); };

popSave.querySelectorAll('.pitem').forEach(b=>b.onclick=()=>{
  const sc=b.dataset.scope; closeAllPops();
  if(sc==='q'){ if(!session.current){toast('Ouvrez un questionnaire d\'abord.');return;} saveQuestionnaire(session.current); }
  else saveSession();
});
popPdf.querySelectorAll('.pitem').forEach(b=>b.onclick=()=>{ const sc=b.dataset.scope; closeAllPops(); if(sc==='divafull') printDivaFull(); else printScope(sc); });

document.addEventListener('click',e=>{ if(!e.target.closest('.tools')) closeAllPops(); });

function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),2600); }
function showModal(html){ modalbox.innerHTML=html; modal.classList.add('show'); }
function closeModal(){ modal.classList.remove('show'); }
modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });

/* segmented toggle + chip + brand */
seg.addEventListener('click',e=>{ const b=e.target.closest('button[data-v]'); if(b) setView(b.dataset.v); });
patientChip.onclick=goHome;
document.getElementById('brandHome').onclick=goHome;

/* mobile nav */
const scrim=document.getElementById('scrim');
function openNav(){document.body.classList.add('nav-open');}
function closeNav(){document.body.classList.remove('nav-open');}
document.getElementById('hamb').onclick=()=>document.body.classList.toggle('nav-open');
scrim.onclick=closeNav;

/* go */
applyAccent(HOME_PAL);
render();
</script>
